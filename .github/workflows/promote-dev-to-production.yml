name: Promote Dev to Production

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: promote-cvm-dev-to-production
  cancel-in-progress: false

jobs:
  promote:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Confirm dev page exists
        run: |
          if [ ! -f dev.html ]; then
            echo "dev.html was not found."
            exit 1
          fi

      - name: Promote dev page
        run: cp dev.html index.html

      - name: Commit production page
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add index.html

          if git diff --cached --quiet; then
            echo "Production already matches dev."
            exit 0
          fi

          git commit -m "Promote dev event feed to production"
          git pull --rebase origin master
          git push origin HEAD:master
