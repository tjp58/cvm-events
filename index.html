<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <title>CVM Events</title>

  <style>
    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: #ffffff;
      font-family: Arial, Helvetica, sans-serif;
      color: #222222;
    }

    #status {
      padding: 40px;
      font-size: 28px;
    }

    .localist-widget {
      width: 100%;
    }

    .localist-widget .event-list {
      font-size: 15px;
    }
  </style>
</head>

<body>
  <div id="status">Loading Cornell events...</div>

  <div
    id="localist-widget-94774094"
    class="localist-widget"
  ></div>

  <script>
    var statusElement = document.getElementById("status");
    var scriptElement = document.createElement("script");

    scriptElement.type = "text/javascript";

    scriptElement.src =
      "https://events.cornell.edu/widget/view" +
      "?schools=cornell" +
      "&types=5167" +
      "&days=31" +
      "&num=4" +
      "&container=localist-widget-94774094" +
      "&template=cornell-edu-events-template-with-room" +
      "&cache=" + new Date().getTime();

    scriptElement.onload = function () {
      statusElement.innerHTML = "Events loaded.";

      window.setTimeout(function () {
        var container =
          document.getElementById("localist-widget-94774094");

        if (container && container.innerHTML.length > 10) {
          statusElement.style.display = "none";
        } else {
          statusElement.innerHTML =
            "The Cornell event service loaded, but returned no visible events.";
        }
      }, 4000);
    };

    scriptElement.onerror = function () {
      statusElement.innerHTML =
        "Unable to load the Cornell event service.";
    };

    document.body.appendChild(scriptElement);
  </script>
</body>
</html>
